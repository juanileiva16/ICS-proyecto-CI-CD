# Nombre del workflow: aparece en la pestaña "Actions" de GitHub.
name: CI

# "on" define QUÉ eventos disparan este workflow.
on:
  # Cuando se hace push directo a la rama main (ej: al fusionar una PR).
  push:
    branches: [ main ]
  # Cuando se abre o actualiza una Pull Request que apunta a main.
  # Este es el que valida tus cambios ANTES de fusionarlos.
  pull_request:
    branches: [ main ]

# Un workflow tiene uno o más "jobs". Cada job corre en una máquina virtual limpia.
jobs:
  ci:
    # La máquina virtual donde corre todo: la última versión de Ubuntu.
    runs-on: ubuntu-latest

    # Un job es una secuencia de "steps" (pasos). Se ejecutan en orden,
    # y si uno falla, el job entero falla (la 🟥 que verás en GitHub).
    steps:
      # 1. Descarga tu código del repo a la máquina virtual.
      #    "fetch-depth: 0" trae TODO el historial de commits (no un clon
      #    superficial). SonarQube lo necesita para ubicar correctamente la
      #    antigüedad y autoría de cada problema que detecta.
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Instala Node.js. "cache: npm" guarda las dependencias entre
      #    ejecuciones para que el CI sea más rápido la próxima vez.
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Instala las dependencias. "npm ci" es como "npm install" pero
      #    pensado para CI: usa el package-lock.json exacto y es más rápido
      #    y reproducible.
      - name: Instalar dependencias
        run: npm ci

      # 4. Análisis estático: revisa el estilo y errores comunes del código.
      - name: Lint
        run: npm run lint

      # 5. Build: verifica que todos los módulos cargan sin errores.
      - name: Build
        run: npm run build

      # 6. Tests CON cobertura: corre Jest y además genera el reporte
      #    coverage/lcov.info, que en el paso siguiente le pasamos a Sonar.
      #    Si algún test falla, el CI falla igual que antes.
      - name: Tests con cobertura
        run: npm run test:coverage

      # 7. INSPECCIÓN DE CÓDIGO (la pata de "inspección" de tu diagrama):
      #    el scanner lee sonar-project.properties + la cobertura del paso 6,
      #    analiza el código y sube los resultados a SonarQube Cloud.
      #    El SONAR_TOKEN (secret) lo autentica con tu cuenta.
      - name: Inspección de código (SonarQube)
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 8. FEEDBACK (1ª flecha del diagrama): avisa a Discord el resultado
      #    de la integración, pero SOLO cuando aporta algo:
      #      - En Pull Requests: es el único feedback (no hay deploy).
      #      - O cuando algo FALLÓ: para enterarte aunque no se despliegue.
      #    En un push a main exitoso NO avisa acá (sería redundante):
      #    de eso se encarga la notificación del job "deploy".
      - name: Feedback a Discord (integración y pruebas)
        if: github.event_name == 'pull_request' || failure()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ESTADO="✅ Integración OK — lint, build y tests pasaron"
          else
            ESTADO="❌ Integración FALLÓ — revisar lint/build/tests"
          fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"$ESTADO\n**Repo:** ${{ github.repository }}\n**Rama:** ${{ github.ref_name }}\n**Commit:** \`${{ github.sha }}\`\n**Detalle:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"

  # ──────────────────────────────────────────────────────────────
  # Segundo job: despliega a Vercel.
  # ──────────────────────────────────────────────────────────────
  deploy:
    # "needs: ci" => este job espera a que el job "ci" termine BIEN.
    # Si lint/build/tests fallan, deploy NO se ejecuta. Ese es el candado.
    needs: ci

    # "if" => solo desplegamos en un push a main (ej: al fusionar una PR).
    # En las Pull Requests se corren los tests, pero NO se despliega.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    # Exponemos la URL del despliegue para que el job de smoke test la use.
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    # La CLI de Vercel lee estos dos IDs automáticamente desde el entorno.
    # Los valores salen de los secrets que cargaste en GitHub (nunca quedan
    # escritos en texto plano en el repo).
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      # Volvemos a clonar el repo: cada job arranca en una máquina limpia.
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Instalamos la CLI de Vercel en la máquina virtual.
      - name: Instalar Vercel CLI
        run: npm install -g vercel

      # 1) Descarga la configuración del proyecto Vercel (entorno producción).
      - name: Descargar configuración de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # 2) Construye el paquete de producción listo para desplegar.
      - name: Build de producción
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # 3) Sube el paquete ya construido y lo publica en producción.
      #    "--prebuilt" usa lo que armó el paso anterior (no reconstruye).
      #    Capturamos la URL que devuelve Vercel (última línea) y la
      #    guardamos como output del job para el smoke test.
      - name: Desplegar a producción
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tail -n1)
          echo "URL desplegada: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # FEEDBACK (2ª flecha del diagrama): avisa a Discord el resultado
      #    del despliegue al entorno de entrega (Vercel).
      - name: Feedback a Discord (despliegue)
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ESTADO="🚀 Despliegue a producción OK — app en línea"
          else
            ESTADO="❌ Despliegue FALLÓ — revisar el job de deploy"
          fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"$ESTADO\n**Repo:** ${{ github.repository }}\n**Commit:** \`${{ github.sha }}\`\n**Detalle:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"

  # ──────────────────────────────────────────────────────────────
  # Tercer job: empaqueta la app en una imagen Docker (la flecha
  # "Binarios" del diagrama) y la publica en GitHub Container Registry.
  # ──────────────────────────────────────────────────────────────
  docker:
    # Igual que deploy: solo tiene sentido si la integración pasó.
    needs: ci
    runs-on: ubuntu-latest

    # Permisos que este job necesita sobre el repo:
    #   contents: read  -> leer el código.
    #   packages: write -> publicar la imagen en GHCR (el registro de GitHub).
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # Nos logueamos en GHCR SOLO cuando vamos a publicar (push a main).
      # Usa el GITHUB_TOKEN automático: no hace falta crear ningún secret.
      - name: Login en GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Construye la imagen siguiendo el Dockerfile.
      #   - En Pull Requests: "push: false" => solo CONSTRUYE (verifica que
      #     el Dockerfile compila), no publica nada.
      #   - En push a main: "push: true" => construye Y sube la imagen a GHCR.
      # Etiquetamos con "latest" (la más reciente) y con el SHA del commit
      # (para poder volver a una versión exacta si hace falta).
      - name: Construir y publicar la imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/mundial-2026-prediccion:latest
            ghcr.io/${{ github.repository_owner }}/mundial-2026-prediccion:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────
  # Cuarto job: SMOKE TEST. Prueba la app YA DESPLEGADA en Vercel
  # (la flecha "pruebas en el entorno de entrega" del diagrama).
  # No prueba el código: prueba que el despliegue funciona de verdad.
  # ──────────────────────────────────────────────────────────────
  smoke-test:
    # Solo tiene sentido tras un deploy exitoso. Como deploy solo corre
    # en push a main, este job queda limitado a ese caso.
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      # Le pegamos a /health de la app desplegada. Reintentamos porque el
      # deploy puede tardar unos segundos en estar disponible.
      - name: Verificar que la app desplegada responde
        run: |
          URL="${{ needs.deploy.outputs.url }}"
          echo "Probando la app desplegada en: $URL"
          for intento in 1 2 3 4 5; do
            if curl -fsS "$URL/health" | grep -q '"status":"ok"'; then
              echo "✅ Smoke test OK: la app responde correctamente en $URL"
              exit 0
            fi
            echo "Intento $intento sin éxito, reintentando en 5s..."
            sleep 5
          done
          echo "❌ Smoke test FALLÓ: la app desplegada no respondió correctamente."
          exit 1

      # Avisamos a Discord SOLO si el smoke test falla (en éxito ya avisó el
      # job deploy, así no duplicamos mensajes).
      - name: Feedback a Discord (smoke test falló)
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ Smoke test FALLÓ — la app desplegada no responde\n**Commit:** \`${{ github.sha }}\`\n**Detalle:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
