# Identificación del proyecto en SonarQube Cloud.
# Estos dos valores salen de tu cuenta de SonarCloud.
sonar.projectKey=juanileiva16_ICS-proyecto-CI-CD
sonar.organization=juanileiva16

# Qué carpetas son CÓDIGO de la aplicación (lo que se inspecciona).
sonar.sources=src,public,scripts

# Qué carpeta contiene los TESTS. Sonar los trata distinto del código
# de producción (no les exige cobertura, por ejemplo).
sonar.tests=tests

# Reporte de cobertura que genera Jest (formato lcov). Con esto, Sonar
# sabe qué porcentaje de tu código está cubierto por tests.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
